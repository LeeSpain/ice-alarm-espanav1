<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef7ed"/>
      <stop offset="40%" stop-color="#fef3e2"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="pendant" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="cushion" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0.15"/>
    </linearGradient>
    <clipPath id="windowClip">
      <rect x="485" y="70" width="170" height="220" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Floor -->
  <ellipse cx="400" cy="520" rx="340" ry="60" fill="url(#floor)"/>

  <!-- Wall details — soft shadow lines -->
  <line x1="100" y1="480" x2="700" y2="480" stroke="#e5e7eb" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Window frame -->
  <rect x="480" y="65" width="180" height="230" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <rect x="485" y="70" width="170" height="220" rx="8" fill="url(#window)"/>
  <!-- Window panes -->
  <line x1="570" y1="70" x2="570" y2="290" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="485" y1="180" x2="655" y2="180" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Curtains -->
  <path d="M475 60 Q475 100 460 180 Q455 220 465 290 L480 290 L480 60Z" fill="#fca5a5" opacity="0.4"/>
  <path d="M665 60 Q665 100 680 180 Q685 220 675 290 L660 290 L660 60Z" fill="#fca5a5" opacity="0.4"/>
  <!-- Sunlight rays through window -->
  <g clip-path="url(#windowClip)">
    <circle cx="610" cy="120" r="25" fill="#fde68a" opacity="0.3"/>
    <circle cx="610" cy="120" r="15" fill="#fde68a" opacity="0.4"/>
  </g>

  <!-- Side table -->
  <rect x="560" y="370" width="80" height="5" rx="2" fill="#92400e"/>
  <rect x="570" y="375" width="5" height="100" fill="#92400e"/>
  <rect x="625" y="375" width="5" height="100" fill="#92400e"/>
  <!-- Tea cup on table -->
  <ellipse cx="600" cy="368" rx="14" ry="4" fill="#d1d5db"/>
  <path d="M586 356 Q586 368 600 368 Q614 368 614 356" fill="#fef3c7" stroke="#d1d5db" stroke-width="1.5"/>
  <path d="M614 358 Q622 358 622 363 Q622 368 614 368" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Steam -->
  <path d="M595 348 Q593 340 596 332" stroke="#d1d5db" stroke-width="1" stroke-opacity="0.5" fill="none" stroke-linecap="round"/>
  <path d="M603 346 Q605 336 602 328" stroke="#d1d5db" stroke-width="1" stroke-opacity="0.4" fill="none" stroke-linecap="round"/>

  <!-- Plant pot -->
  <g transform="translate(150, 340)">
    <path d="M-15 30 L-20 0 L20 0 L15 30Z" fill="#92400e"/>
    <ellipse cx="0" cy="0" rx="22" ry="5" fill="#78350f"/>
    <!-- Leaves -->
    <path d="M0 -5 Q-20 -40 -5 -60" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 -5 Q15 -50 25 -55" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 -5 Q-5 -45 -20 -50" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M0 -5 Q10 -35 5 -58" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Leaf shapes -->
    <ellipse cx="-12" cy="-52" rx="10" ry="5" fill="#16a34a" transform="rotate(-30 -12 -52)"/>
    <ellipse cx="22" cy="-48" rx="9" ry="5" fill="#16a34a" transform="rotate(20 22 -48)"/>
    <ellipse cx="-18" cy="-42" rx="8" ry="4" fill="#22c55e" transform="rotate(-15 -18 -42)"/>
    <ellipse cx="10" cy="-55" rx="8" ry="4" fill="#22c55e" transform="rotate(10 10 -55)"/>
  </g>

  <!-- Armchair -->
  <g transform="translate(340, 320)">
    <!-- Chair back -->
    <path d="M-70 -80 Q-75 -20 -70 40 L70 40 Q75 -20 70 -80 Q40 -100 0 -105 Q-40 -100 -70 -80Z" fill="url(#chair)" opacity="0.85"/>
    <!-- Chair back inner -->
    <path d="M-55 -70 Q-58 -15 -55 30 L55 30 Q58 -15 55 -70 Q30 -85 0 -90 Q-30 -85 -55 -70Z" fill="#d97706" opacity="0.6"/>
    <!-- Seat cushion -->
    <ellipse cx="0" cy="35" rx="65" ry="20" fill="url(#cushion)"/>
    <!-- Armrests -->
    <path d="M-70 -30 Q-90 -25 -95 10 Q-90 45 -70 40" fill="#b45309" stroke="#92400e" stroke-width="1"/>
    <path d="M70 -30 Q90 -25 95 10 Q90 45 70 40" fill="#b45309" stroke="#92400e" stroke-width="1"/>
    <!-- Chair legs -->
    <rect x="-65" y="50" width="8" height="30" rx="3" fill="#78350f"/>
    <rect x="57" y="50" width="8" height="30" rx="3" fill="#78350f"/>
  </g>

  <!-- Elderly woman sitting in chair -->
  <g transform="translate(340, 240)">
    <!-- Body / torso -->
    <path d="M-25 40 Q-30 80 -25 110 L25 110 Q30 80 25 40Z" fill="#e0e7ff"/>
    <!-- Cardigan / wrap -->
    <path d="M-28 42 Q-35 70 -30 110 L-15 110 Q-10 75 -12 42Z" fill="#818cf8" opacity="0.6"/>
    <path d="M28 42 Q35 70 30 110 L15 110 Q10 75 12 42Z" fill="#818cf8" opacity="0.6"/>

    <!-- Neck -->
    <rect x="-8" y="20" width="16" height="22" rx="6" fill="#fcd9b6"/>

    <!-- Head -->
    <ellipse cx="0" cy="0" rx="28" ry="32" fill="#fcd9b6"/>
    <!-- Hair -->
    <path d="M-28 -5 Q-30 -35 -15 -38 Q0 -42 15 -38 Q30 -35 28 -5 Q25 -20 0 -24 Q-25 -20 -28 -5Z" fill="#d1d5db"/>
    <path d="M-25 -8 Q-28 -25 -18 -32" fill="#e5e7eb" opacity="0.5"/>
    <!-- Eyes -->
    <ellipse cx="-9" cy="2" rx="3" ry="2" fill="#374151"/>
    <ellipse cx="9" cy="2" rx="3" ry="2" fill="#374151"/>
    <!-- Gentle smile -->
    <path d="M-7 12 Q0 18 7 12" stroke="#c08060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Cheek blush -->
    <circle cx="-15" cy="10" r="5" fill="#fca5a5" opacity="0.3"/>
    <circle cx="15" cy="10" r="5" fill="#fca5a5" opacity="0.3"/>
    <!-- Glasses -->
    <circle cx="-9" cy="1" r="8" fill="none" stroke="#6b7280" stroke-width="1.2"/>
    <circle cx="9" cy="1" r="8" fill="none" stroke="#6b7280" stroke-width="1.2"/>
    <line x1="-1" y1="1" x2="1" y2="1" stroke="#6b7280" stroke-width="1.2"/>
    <line x1="-17" y1="0" x2="-24" y2="-4" stroke="#6b7280" stroke-width="1"/>
    <line x1="17" y1="0" x2="24" y2="-4" stroke="#6b7280" stroke-width="1"/>

    <!-- Arms resting on lap -->
    <path d="M-25 75 Q-35 90 -20 105 L-5 100 Q-15 85 -20 70" fill="#fcd9b6"/>
    <path d="M25 75 Q35 90 20 105 L5 100 Q15 85 20 70" fill="#fcd9b6"/>

    <!-- Pendant on neck — THE KEY ELEMENT -->
    <!-- Pendant glow -->
    <circle cx="0" cy="52" r="22" fill="#6366f1" opacity="0.08"/>
    <circle cx="0" cy="52" r="15" fill="#6366f1" opacity="0.12"/>
    <!-- Pendant cord -->
    <path d="M-8 32 Q-10 42 0 48 Q10 42 8 32" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
    <!-- Pendant button -->
    <circle cx="0" cy="52" r="8" fill="url(#pendant)"/>
    <circle cx="0" cy="52" r="5.5" fill="none" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
    <!-- Small SOS on pendant -->
    <circle cx="0" cy="52" r="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Legs -->
  <path d="M305 430 Q300 470 310 500" stroke="#374151" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M375 430 Q380 470 370 500" stroke="#374151" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Slippers -->
  <ellipse cx="315" cy="505" rx="18" ry="8" fill="#f472b6" opacity="0.6"/>
  <ellipse cx="365" cy="505" rx="18" ry="8" fill="#f472b6" opacity="0.6"/>

  <!-- Safety pulse rings emanating from pendant -->
  <circle cx="340" cy="292" r="30" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <circle cx="340" cy="292" r="50" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <circle cx="340" cy="292" r="75" stroke="#6366f1" stroke-opacity="0.05" stroke-width="1" fill="none" stroke-dasharray="3 4"/>

  <!-- Small floating safety icons around the scene -->

  <!-- Shield icon (top right) -->
  <g transform="translate(680, 150)" opacity="0.7">
    <circle cx="0" cy="0" r="22" fill="white" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M0 -10 L10 -5 Q11 5 0 13 Q-11 5 -10 -5Z" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M-3 1 L-1 4 L4 -2" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Heart icon (left side) -->
  <g transform="translate(100, 200)" opacity="0.6">
    <circle cx="0" cy="0" r="18" fill="white" stroke="#f472b6" stroke-opacity="0.3" stroke-width="1"/>
    <path d="M0 6 Q-8 -2 -6 -5 Q-4 -8 0 -4 Q4 -8 6 -5 Q8 -2 0 6Z" fill="#f472b6" opacity="0.5"/>
  </g>

  <!-- Phone/call icon (bottom right area) -->
  <g transform="translate(680, 420)" opacity="0.6">
    <circle cx="0" cy="0" r="18" fill="white" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <path d="M-5 -6 Q-6 -3 -4 0 Q-2 4 2 6 L4 4 Q5 3 4 2 L2 2 Q1 3 0 2 Q-2 0 -3 -2 Q-4 -3 -3 -4 L-3 -6 Q-4 -7 -5 -6Z" fill="#22c55e" opacity="0.6"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="120" cy="120" r="3" fill="#6366f1" opacity="0.08"/>
  <circle cx="700" cy="100" r="2" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="90" cy="450" r="2.5" fill="#f59e0b" opacity="0.06"/>
  <circle cx="720" cy="350" r="2" fill="#22c55e" opacity="0.06"/>
  <circle cx="200" cy="550" r="3" fill="#6366f1" opacity="0.05"/>
  <circle cx="600" cy="540" r="2" fill="#8b5cf6" opacity="0.05"/>

  <!-- Warm light glow in the scene -->
  <circle cx="570" cy="160" r="120" fill="#fde68a" opacity="0.06"/>
  <circle cx="340" cy="300" r="180" fill="#6366f1" opacity="0.02"/>
</svg>
