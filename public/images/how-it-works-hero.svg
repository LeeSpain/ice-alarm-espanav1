<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="50%" stop-color="#eef0ff"/>
      <stop offset="100%" stop-color="#f5f0ff"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Large protective shield shape behind everything -->
  <path d="M400 60 L560 130 Q580 280 400 500 Q220 280 240 130Z" fill="url(#shield)" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Orbit rings -->
  <ellipse cx="400" cy="270" rx="220" ry="180" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1" fill="none"/>
  <ellipse cx="400" cy="270" rx="160" ry="130" stroke="#6366f1" stroke-opacity="0.09" stroke-width="1" fill="none"/>
  <ellipse cx="400" cy="270" rx="100" ry="80" stroke="#6366f1" stroke-opacity="0.12" stroke-width="1" fill="none"/>

  <!-- Pulse rings from centre -->
  <circle cx="400" cy="270" r="55" stroke="#6366f1" stroke-opacity="0.15" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <circle cx="400" cy="270" r="75" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1" fill="none" stroke-dasharray="3 4"/>

  <!-- Central SOS pendant button -->
  <circle cx="400" cy="270" r="42" fill="url(#btn)"/>
  <circle cx="400" cy="270" r="36" fill="none" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="400" y="265" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" letter-spacing="2">SOS</text>
  <text x="400" y="283" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="400" opacity="0.7">PRESS FOR HELP</text>

  <!-- Dashed connection paths -->
  <path d="M365 235 Q300 190 230 160" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="5 4" fill="none"/>
  <path d="M435 235 Q500 190 570 160" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="5 4" fill="none"/>
  <path d="M435 305 Q500 350 570 380" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="5 4" fill="none"/>
  <path d="M365 305 Q300 350 230 380" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="5 4" fill="none"/>
  <path d="M570 175 Q620 260 595 365" stroke="#6366f1" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="4 4" fill="none"/>
  <path d="M570 395 Q490 440 230 395" stroke="#6366f1" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="4 4" fill="none"/>

  <!-- Step 1: Person / Alert (top-left) -->
  <g transform="translate(195,135)">
    <circle cx="0" cy="0" r="32" fill="white" stroke="#22c55e" stroke-width="2"/>
    <circle cx="0" cy="-7" r="7" fill="#22c55e"/>
    <path d="M-10 10 Q-10 1 0 1 Q10 1 10 10 L10 14 Q10 16 8 16 L-8 16 Q-10 16 -10 14Z" fill="#22c55e"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="0" r="38"/>
  </g>
  <circle cx="195" cy="135" r="38" fill="none" stroke="#22c55e" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Step number -->
  <circle cx="222" cy="110" r="11" fill="#22c55e"/>
  <text x="222" y="114" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700">1</text>
  <text x="195" y="188" text-anchor="middle" fill="#374151" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">The Alert</text>
  <text x="195" y="202" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="9">Button pressed</text>

  <!-- Step 2: Isabella AI (top-right) -->
  <g transform="translate(575,135)">
    <circle cx="0" cy="0" r="32" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-11" y="-13" width="22" height="18" rx="5" fill="#3b82f6"/>
    <circle cx="-4" cy="-6" r="2.5" fill="white"/>
    <circle cx="4" cy="-6" r="2.5" fill="white"/>
    <rect x="-4" y="0" width="8" height="2" rx="1" fill="white"/>
    <line x1="0" y1="5" x2="0" y2="10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  </g>
  <circle cx="575" cy="135" r="38" fill="none" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="602" cy="110" r="11" fill="#3b82f6"/>
  <text x="602" y="114" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700">2</text>
  <text x="575" y="188" text-anchor="middle" fill="#374151" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">Isabella AI</text>
  <text x="575" y="202" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="9">Answers in 3 sec</text>

  <!-- Step 3: Call Centre (bottom-right) -->
  <g transform="translate(575,385)">
    <circle cx="0" cy="0" r="32" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M-11 1 L-11 -4 Q-11 -13 0 -13 Q11 -13 11 -4 L11 1" stroke="#8b5cf6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <rect x="-14" y="-2" width="7" height="11" rx="3" fill="#8b5cf6"/>
    <rect x="7" y="-2" width="7" height="11" rx="3" fill="#8b5cf6"/>
    <path d="M-4 12 Q-4 16 0 16 Q4 16 4 12" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
  </g>
  <circle cx="575" cy="385" r="38" fill="none" stroke="#8b5cf6" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="602" cy="360" r="11" fill="#8b5cf6"/>
  <text x="602" y="364" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700">3</text>
  <text x="575" y="438" text-anchor="middle" fill="#374151" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">Human Team</text>
  <text x="575" y="452" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="9">Takes over</text>

  <!-- Step 4: Emergency / Help (bottom-left) -->
  <g transform="translate(195,385)">
    <circle cx="0" cy="0" r="32" fill="white" stroke="#ef4444" stroke-width="2"/>
    <rect x="-9" y="-3" width="18" height="6" rx="1" fill="#ef4444"/>
    <rect x="-3" y="-9" width="6" height="18" rx="1" fill="#ef4444"/>
  </g>
  <circle cx="195" cy="385" r="38" fill="none" stroke="#ef4444" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="222" cy="360" r="11" fill="#ef4444"/>
  <text x="222" y="364" text-anchor="middle" fill="white" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700">4</text>
  <text x="195" y="438" text-anchor="middle" fill="#374151" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">112 Called</text>
  <text x="195" y="452" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="9">Help dispatched</text>

  <!-- Family notification (far right) -->
  <g transform="translate(700,270)">
    <circle cx="0" cy="0" r="24" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="-6" y="-10" width="12" height="20" rx="2.5" fill="#f59e0b"/>
    <rect x="-4" y="-7" width="8" height="13" rx="1" fill="white"/>
    <circle cx="0" cy="8" r="1.5" fill="#f59e0b"/>
  </g>
  <path d="M630 270 L672 270" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="4 3" fill="none"/>
  <text x="700" y="308" text-anchor="middle" fill="#374151" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600">Family</text>
  <text x="700" y="320" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="8">Notified</text>

  <!-- Bottom tagline -->
  <text x="400" y="530" text-anchor="middle" fill="#6366f1" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600">From Button Press to Safety — Under 2 Minutes</text>
  <text x="400" y="552" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="11">AI + Human response, 24 hours a day, 365 days a year</text>

  <!-- Subtle decorative dots -->
  <circle cx="80" cy="80" r="3" fill="#6366f1" opacity="0.06"/>
  <circle cx="130" cy="55" r="2" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="720" cy="80" r="2.5" fill="#6366f1" opacity="0.06"/>
  <circle cx="680" cy="520" r="2" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="100" cy="520" r="3" fill="#6366f1" opacity="0.06"/>
  <circle cx="50" cy="300" r="2" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="750" cy="450" r="2" fill="#6366f1" opacity="0.04"/>
</svg>
